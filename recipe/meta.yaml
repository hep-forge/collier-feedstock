{% set versions = {
    "1.2.8": "5cb24ce24ba1f62b7a96c655b31e9fddccc603eff31e60f9033b16354a6afd89"
} %}

{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}

{% set name = environ.get('ANACONDA_PACKAGE', 'collier')|string|lower %}

package:
  name: {{ name }}
  version: {{ environ.get('ANACONDA_VERSION', version)|replace("-", ".") }}

source:
  url: "https://collier.hepforge.org/downloads/?f=collier-{{ version }}.tar.gz"
  fn: "collier-{{ version }}.tar.gz"
  {% if versions.get(version, None) %}
  sha256: {{ versions.get(version) }}
  {% endif %}
  folder: source

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}  # not used by collier itself, but CMake errors without a CXX compiler present
    - {{ compiler('gfortran') }}
    - {{ stdlib('c') }}
    - cmake
    - make
    - sed

test:
  commands:
    - test -f $PREFIX/lib/cmake/collierConfig.cmake
    - test -f $PREFIX/lib/cmake/collierConfigVersion.cmake
    - test -f $PREFIX/lib/libcollier${SHLIB_EXT}
    - test -f $PREFIX/include/collier.mod

about:
  home: "https://collier.hepforge.org/"
  license: "GPL-3.0-only"
  license_file: source/COPYING
  summary: "COLLIER: a Complex One-Loop LIbrary with Extended Regularizations"
  description: |
    COLLIER is a Fortran library for the numerical evaluation of one-loop
    scalar and tensor integrals appearing in perturbative relativistic
    quantum field theory, with dimensional/mass regularization for UV and
    IR divergences, support for complex internal masses, and a cache system
    to speed up repeated evaluations.

extra:
  recipe-maintainers:
    - meiyasan
